plugins {
    id 'java'
    id 'application'
    id 'com.diffplug.spotless' version '7.0.2'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'de.hsbi.lockgame.Main'
}

test {
    useJUnitPlatform()
}

spotless {
    java {
        eclipse()
    }
}